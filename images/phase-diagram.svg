<svg xmlns="http://www.w3.org/2000/svg" width="680" height="580" viewBox="0 0 680 580">
  <rect width="680" height="580" fill="#0d1117" rx="12"/>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#8b949e"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="8 0, 0 3, 8 6" fill="#8b949e"/></marker>
    <marker id="aRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#da3633"/></marker>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/></marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" fill="#58a6ff" font-size="17" font-weight="bold" font-family="sans-serif">Two-Phase Development Flow</text>

  <!-- Start -->
  <rect x="255" y="48" width="170" height="36" rx="18" fill="#8b5cf6"/>
  <text x="340" y="71" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">Boss Intent</text>
  <line x1="340" y1="84" x2="340" y2="105" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Phase 1 border -->
  <rect x="40" y="105" width="600" height="148" rx="10" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="126" fill="#f0883e" font-size="12" font-weight="bold" font-family="sans-serif">Phase 1: Spec Review (once)</text>

  <!-- Architect -->
  <rect x="65" y="140" width="150" height="46" rx="8" fill="#f0883e"/>
  <text x="140" y="160" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">Architect</text>
  <text x="140" y="176" text-anchor="middle" fill="#ffe0c0" font-size="9" font-family="sans-serif">Writes spec</text>

  <!-- Reviewer -->
  <rect x="275" y="140" width="150" height="46" rx="8" fill="#da3633"/>
  <text x="350" y="160" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">Reviewer</text>
  <text x="350" y="176" text-anchor="middle" fill="#ffc0c0" font-size="9" font-family="sans-serif">Challenges spec</text>

  <!-- Bidirectional -->
  <line x1="215" y1="163" x2="275" y2="163" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)" marker-start="url(#aR)"/>
  <text x="245" y="155" text-anchor="middle" fill="#c9d1d9" font-size="9" font-family="sans-serif">3 rounds</text>

  <!-- Boss sign-off -->
  <rect x="490" y="140" width="130" height="46" rx="8" fill="#8b5cf6"/>
  <text x="555" y="160" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">Boss</text>
  <text x="555" y="176" text-anchor="middle" fill="#e0d0ff" font-size="9" font-family="sans-serif">Sign-off</text>

  <line x1="425" y1="163" x2="490" y2="163" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="458" y="155" text-anchor="middle" fill="#8b949e" font-size="8" font-family="sans-serif">approved</text>

  <!-- Phase 1 output -->
  <rect x="130" y="200" width="320" height="26" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="290" y="218" text-anchor="middle" fill="#8b949e" font-size="10" font-family="sans-serif">Output: PROJECT.md + docs/*.md + tasks-backlog.md</text>

  <!-- Arrow to Phase 2 -->
  <line x1="340" y1="253" x2="340" y2="278" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Phase 2 border -->
  <rect x="40" y="278" width="600" height="230" rx="10" fill="none" stroke="#238636" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="299" fill="#238636" font-size="12" font-weight="bold" font-family="sans-serif">Phase 2: Task Execution (loop per task)</text>

  <!-- Architect task -->
  <rect x="65" y="315" width="140" height="46" rx="8" fill="#f0883e"/>
  <text x="135" y="335" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">Architect</text>
  <text x="135" y="351" text-anchor="middle" fill="#ffe0c0" font-size="9" font-family="sans-serif">Writes task.md</text>

  <!-- Coder -->
  <rect x="255" y="315" width="140" height="46" rx="8" fill="#238636"/>
  <text x="325" y="335" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">Coder</text>
  <text x="325" y="351" text-anchor="middle" fill="#c0ffc0" font-size="9" font-family="sans-serif">Code + tests</text>

  <!-- Reviewer -->
  <rect x="445" y="315" width="140" height="46" rx="8" fill="#da3633"/>
  <text x="515" y="335" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">Reviewer</text>
  <text x="515" y="351" text-anchor="middle" fill="#ffc0c0" font-size="9" font-family="sans-serif">Audits vs spec</text>

  <!-- Arrows across -->
  <line x1="205" y1="338" x2="255" y2="338" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="395" y1="338" x2="445" y2="338" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Review loop -->
  <path d="M 515 361 L 515 385 L 325 385 L 325 361" fill="none" stroke="#da3633" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#aRed)"/>
  <text x="420" y="399" text-anchor="middle" fill="#da3633" font-size="9" font-family="sans-serif">3 rounds max</text>

  <!-- git commit -->
  <rect x="195" y="420" width="120" height="36" rx="8" fill="#238636"/>
  <text x="255" y="443" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="sans-serif">git commit</text>

  <!-- SOP retro -->
  <rect x="365" y="420" width="120" height="36" rx="8" fill="#8b5cf6"/>
  <text x="425" y="443" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="sans-serif">SOP Retro</text>

  <!-- Reviewer approved -> commit -->
  <line x1="515" y1="361" x2="315" y2="420" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- commit -> retro -->
  <line x1="315" y1="438" x2="365" y2="438" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- retro -> next task loop -->
  <path d="M 425 456 L 425 485 L 135 485 L 135 361" fill="none" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <text x="280" y="498" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="bold" font-family="sans-serif">Next task</text>

  <!-- Arrow to final -->
  <line x1="340" y1="508" x2="340" y2="535" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Final output -->
  <rect x="170" y="535" width="340" height="32" rx="16" fill="#238636"/>
  <text x="340" y="556" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="sans-serif">Reviewed code + tests + changelog</text>
</svg>
